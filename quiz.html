<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クイズ | ニュース読んでる？</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/effects.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- カウントダウンオーバーレイ -->
  <div class="countdown-overlay" id="countdownOverlay">
    <div class="countdown-number" id="countdownNum">3</div>
  </div>

  <!-- クイズ本体（カウントダウン後に表示） -->
  <div class="quiz-wrapper hidden" id="quizWrapper">

    <!-- プログレスバー -->
    <div class="quiz-progress-wrapper">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="quiz-progress-dots" id="progressDots"></div>
    </div>

    <!-- ヘッダー：問題番号・バッジ -->
    <div class="quiz-header">
      <span class="quiz-question-num" id="questionNum">1 / 10</span>
      <div class="quiz-badges" id="questionBadges"></div>
    </div>

    <!-- タイマー -->
    <div class="timer-area">
      <div class="timer-circle">
        <svg viewBox="0 0 64 64">
          <circle class="timer-circle-bg" cx="32" cy="32" r="28"></circle>
          <circle class="timer-circle-fg" id="timerCircle" cx="32" cy="32" r="28"></circle>
        </svg>
        <div class="timer-text" id="timerText">30</div>
      </div>
      <span class="timer-total" id="totalTime">経過 0:00</span>
    </div>

    <!-- 問題文 -->
    <div class="question-area question-enter" id="questionArea">
      <div class="question-text" id="questionText"></div>
    </div>

    <!-- 選択肢 -->
    <div class="choices-area" id="choicesArea"></div>

    <!-- 解説（正解後に表示） -->
    <div class="explanation-area hidden" id="explanationArea">
      <h4>解説</h4>
      <div class="explanation-text" id="explanationText"></div>
      <div class="debate-topic" id="debateTopic"></div>
    </div>

    <!-- 次の問題ボタン -->
    <div class="next-btn-area hidden" id="nextBtnArea">
      <button class="next-btn" id="nextBtn">NEXT →</button>
    </div>
  </div>

  <!-- クイズ終了オーバーレイ -->
  <div class="quiz-finish-overlay hidden" id="finishOverlay">
    <div class="finish-label">FINISH!</div>
    <div class="finish-score" id="finishScore">0 / 10</div>
    <div class="finish-sub">結果画面に移動します...</div>
  </div>

  <script src="js/config.js" onerror="console.warn('config.js not found')"></script>
  <script>
    if (typeof _supabase === 'undefined') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#f0c040"><h2>設定ファイルが見つかりません</h2><p style="color:#aaa;margin-top:12px">js/config.js を作成してください。<br>テンプレート: js/config.example.js</p></div>';
      throw new Error('config.js is missing');
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/rank-system.js"></script>
  <script>
    // ── 状態管理 ──
    let currentUser = null;
    let quizId = null;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let categoryScores = { politics: 0, economy: 0, international: 0 };
    let answers = [];
    let questionTimer = null;
    let timeLeft = 30;
    let totalElapsed = 0;
    let totalTimerInterval = null;
    let quizStartTime = null;

    const TIMER_DURATION = 30;
    const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * 28; // ≈175.93

    // ── 初期化 ──
    (async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      quizId = sessionStorage.getItem('currentQuizId');
      if (!quizId) {
        const { data: latest } = await _supabase
          .from('quiz_sets')
          .select('id')
          .eq('is_published', true)
          .order('week_start', { ascending: false })
          .limit(1)
          .maybeSingle();

        if (!latest) {
          alert('公開中のクイズがありません。');
          window.location.href = 'home.html';
          return;
        }
        quizId = latest.id;
      }

      // 受験済みチェック（UNIQUE制約と合わせて二重防止）
      const { data: existing } = await _supabase
        .from('weekly_scores')
        .select('id')
        .eq('user_id', currentUser.id)
        .eq('quiz_id', quizId)
        .maybeSingle();

      if (existing) {
        alert('このクイズはすでに受験済みです。');
        window.location.href = 'home.html';
        return;
      }

      // 問題取得
      const { data: qs, error } = await _supabase
        .from('questions')
        .select('*')
        .eq('quiz_id', quizId)
        .order('order_num', { ascending: true });

      if (error || !qs || qs.length === 0) {
        alert('問題の読み込みに失敗しました。');
        window.location.href = 'home.html';
        return;
      }

      questions = qs;
      buildProgressDots();
      startCountdown();
    })();

    // ── プログレスドット構築 ──
    function buildProgressDots() {
      const container = document.getElementById('progressDots');
      for (let i = 0; i < questions.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.id = `dot-${i}`;
        container.appendChild(dot);
      }
    }

    // ── カウントダウン 3→2→1→GO! ──
    function startCountdown() {
      const overlay = document.getElementById('countdownOverlay');
      const numEl = document.getElementById('countdownNum');
      let count = 3;

      numEl.textContent = count;
      numEl.className = 'countdown-number';

      const interval = setInterval(() => {
        count--;
        if (count > 0) {
          numEl.textContent = count;
          numEl.className = 'countdown-number';
          void numEl.offsetWidth; // reflow for animation restart
          numEl.className = 'countdown-number';
        } else if (count === 0) {
          numEl.textContent = 'GO!';
          numEl.className = 'countdown-go';
        } else {
          clearInterval(interval);
          overlay.classList.add('hidden');
          document.getElementById('quizWrapper').classList.remove('hidden');
          quizStartTime = Date.now();
          startTotalTimer();
          showQuestion(0);
        }
      }, 800);
    }

    // ── 全体経過タイマー ──
    function startTotalTimer() {
      totalTimerInterval = setInterval(() => {
        totalElapsed = Math.floor((Date.now() - quizStartTime) / 1000);
        const m = Math.floor(totalElapsed / 60);
        const s = String(totalElapsed % 60).padStart(2, '0');
        document.getElementById('totalTime').textContent = `経過 ${m}:${s}`;
      }, 1000);
    }

    // ── 問題表示 ──
    function showQuestion(index) {
      currentIndex = index;
      const q = questions[index];

      // ヘッダー更新
      document.getElementById('questionNum').textContent = `${index + 1} / ${questions.length}`;
      document.getElementById('progressFill').style.width = `${((index) / questions.length) * 100}%`;

      // バッジ
      const badgesEl = document.getElementById('questionBadges');
      const categoryLabel = { politics: '政治', economy: '経済', international: '国際' };
      const diffLabel = { easy: '易', medium: '中', hard: '難' };
      badgesEl.innerHTML = `
        <span class="badge badge--${q.category}">${categoryLabel[q.category] || q.category}</span>
        <span class="badge badge--${q.difficulty}">${diffLabel[q.difficulty] || q.difficulty}</span>
      `;

      // プログレスドット
      const dots = document.querySelectorAll('.progress-dot');
      dots.forEach((d, i) => {
        if (i === index) d.classList.add('current');
        else d.classList.remove('current');
      });

      // 問題文
      const qArea = document.getElementById('questionArea');
      qArea.classList.remove('question-enter');
      void qArea.offsetWidth;
      qArea.classList.add('question-enter');
      document.getElementById('questionText').textContent = q.question_text;

      // 選択肢
      const choicesArea = document.getElementById('choicesArea');
      choicesArea.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];
      const choiceTexts = [q.choice_a, q.choice_b, q.choice_c, q.choice_d];
      labels.forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-label">${label}</span><span class="choice-text">${choiceTexts[i]}</span>`;
        btn.addEventListener('click', () => handleAnswer(label, btn));
        choicesArea.appendChild(btn);
      });

      // 解説・次ボタンを隠す
      document.getElementById('explanationArea').classList.add('hidden');
      document.getElementById('nextBtnArea').classList.add('hidden');

      // タイマー開始
      startQuestionTimer();
    }

    // ── 1問タイマー ──
    function startQuestionTimer() {
      timeLeft = TIMER_DURATION;
      updateTimerDisplay();

      const timerCircle = document.getElementById('timerCircle');
      const timerTextEl = document.getElementById('timerText');
      timerCircle.classList.remove('warning');
      timerTextEl.classList.remove('timer-warning');
      timerCircle.style.strokeDashoffset = '0';

      clearInterval(questionTimer);
      questionTimer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        // 円弧アニメーション
        const offset = ((TIMER_DURATION - timeLeft) / TIMER_DURATION) * CIRCLE_CIRCUMFERENCE;
        timerCircle.style.strokeDashoffset = offset;

        // 残り10秒で警告
        if (timeLeft <= 10) {
          timerCircle.classList.add('warning');
          timerTextEl.classList.add('timer-warning');
        }

        // 時間切れ
        if (timeLeft <= 0) {
          clearInterval(questionTimer);
          handleTimeUp();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      document.getElementById('timerText').textContent = timeLeft;
    }

    // ── 時間切れ ──
    function handleTimeUp() {
      disableAllChoices();

      // TIME UP! 表示
      const timeupEl = document.createElement('div');
      timeupEl.className = 'timeup-text';
      timeupEl.textContent = "TIME UP!";
      document.body.appendChild(timeupEl);

      // 正解をハイライト
      highlightCorrectAnswer();

      // 不正解として記録
      recordAnswer(null, false);

      setTimeout(() => {
        timeupEl.remove();
        showExplanationAndNext();
      }, 1200);
    }

    // ── 回答処理 ──
    function handleAnswer(selected, btnEl) {
      clearInterval(questionTimer);
      disableAllChoices();

      const q = questions[currentIndex];
      const isCorrect = selected === q.correct_answer;

      btnEl.classList.add('selected');

      if (isCorrect) {
        btnEl.classList.add('correct');
        score++;
        categoryScores[q.category] = (categoryScores[q.category] || 0) + 1;
        showCorrectEffect();
      } else {
        btnEl.classList.add('wrong');
        highlightCorrectAnswer();
        showWrongEffect();
      }

      recordAnswer(selected, isCorrect);

      // ドット更新
      const dot = document.getElementById(`dot-${currentIndex}`);
      dot.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

      setTimeout(() => {
        showExplanationAndNext();
      }, 1000);
    }

    // ── 回答記録（ローカル配列に追加） ──
    function recordAnswer(selected, isCorrect) {
      answers.push({
        question_id: questions[currentIndex].id,
        quiz_id: quizId,
        selected_answer: selected || 'TIMEOUT',
        is_correct: isCorrect,
      });
    }

    // ── 選択肢無効化 ──
    function disableAllChoices() {
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
    }

    // ── 正解ハイライト ──
    function highlightCorrectAnswer() {
      const q = questions[currentIndex];
      const btns = document.querySelectorAll('.choice-btn');
      const labels = ['A', 'B', 'C', 'D'];
      const correctIdx = labels.indexOf(q.correct_answer);
      if (correctIdx >= 0 && btns[correctIdx]) {
        btns[correctIdx].classList.add('correct');
      }
    }

    // ── 正解エフェクト ──
    function showCorrectEffect() {
      const overlay = document.createElement('div');
      overlay.className = 'correct-overlay';
      const text = document.createElement('div');
      text.className = 'correct-text';
      text.textContent = 'CORRECT!';
      document.body.appendChild(overlay);
      document.body.appendChild(text);
      setTimeout(() => { overlay.remove(); text.remove(); }, 900);
    }

    // ── 不正解エフェクト ──
    function showWrongEffect() {
      const overlay = document.createElement('div');
      overlay.className = 'wrong-overlay';
      const text = document.createElement('div');
      text.className = 'wrong-text';
      text.textContent = 'WRONG!';
      document.body.appendChild(overlay);
      document.body.appendChild(text);
      document.body.classList.add('shake');
      setTimeout(() => {
        overlay.remove();
        text.remove();
        document.body.classList.remove('shake');
      }, 900);
    }

    // ── 解説表示 + 次へボタン ──
    function showExplanationAndNext() {
      const q = questions[currentIndex];

      const expArea = document.getElementById('explanationArea');
      document.getElementById('explanationText').textContent = q.explanation || '';
      const debateEl = document.getElementById('debateTopic');
      if (q.debate_topic) {
        debateEl.innerHTML = `<strong>関連論題：</strong>${q.debate_topic}`;
        debateEl.classList.remove('hidden');
      } else {
        debateEl.classList.add('hidden');
      }
      expArea.classList.remove('hidden');

      // 最終問題かどうか
      const nextArea = document.getElementById('nextBtnArea');
      const nextBtn = document.getElementById('nextBtn');

      if (currentIndex < questions.length - 1) {
        nextBtn.textContent = 'NEXT →';
        nextBtn.onclick = () => showQuestion(currentIndex + 1);
      } else {
        nextBtn.textContent = 'FINISH →';
        nextBtn.onclick = () => finishQuiz();
      }
      nextArea.classList.remove('hidden');
    }

    // ── クイズ終了 ──
    async function finishQuiz() {
      clearInterval(totalTimerInterval);
      const timeTaken = Math.floor((Date.now() - quizStartTime) / 1000);

      // プログレス100%
      document.getElementById('progressFill').style.width = '100%';

      // 終了オーバーレイ
      const finishEl = document.getElementById('finishOverlay');
      document.getElementById('finishScore').textContent = `${score} / ${questions.length}`;
      finishEl.classList.remove('hidden');
      document.getElementById('quizWrapper').classList.add('hidden');

      // Supabase に回答を一括保存
      const answerRows = answers.map(a => ({
        user_id: currentUser.id,
        question_id: a.question_id,
        quiz_id: a.quiz_id,
        selected_answer: a.selected_answer,
        is_correct: a.is_correct,
      }));

      await _supabase.from('answers').insert(answerRows);

      // weekly_scores に保存
      await _supabase.from('weekly_scores').insert({
        user_id: currentUser.id,
        quiz_id: quizId,
        total_score: score,
        time_taken: timeTaken,
        politics_score: categoryScores.politics || 0,
        economy_score: categoryScores.economy || 0,
        international_score: categoryScores.international || 0,
      });

      // ランクスコア更新
      const newParticipations = (currentUser.total_participations || 0) + 1;

      // これまでの全スコアを取得して平均を計算
      const { data: allScores } = await _supabase
        .from('weekly_scores')
        .select('total_score')
        .eq('user_id', currentUser.id);

      const totalAll = allScores.reduce((sum, s) => sum + s.total_score, 0);
      const { newRank, didRankUp, rankScore } = await updateUserRank(
        currentUser.id,
        totalAll,
        newParticipations
      );

      // 結果データをセッションに保存して遷移
      sessionStorage.setItem('quizResult', JSON.stringify({
        score,
        total: questions.length,
        timeTaken,
        categoryScores,
        answers: answers.map((a, i) => ({
          ...a,
          question: questions[i],
        })),
        didRankUp,
        newRank: newRank ? { id: newRank.id, name: newRank.name, chapter: newRank.chapter } : null,
        rankScore: Math.floor(rankScore),
      }));

      setTimeout(() => {
        window.location.href = 'result.html';
      }, 2000);
    }
  </script>
</body>
</html>
