<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュース読んでる？</title>
  <link rel="stylesheet" href="css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .title {
      font-family: var(--font-pixel);
      font-size: 2rem;
      color: var(--color-accent);
      line-height: 1.6;
      text-shadow: 0 0 20px rgba(240, 192, 64, 0.4);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 48px;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 36px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-base);
      background: var(--color-accent);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .login-btn:hover {
      background: #e0b030;
      box-shadow: 0 0 20px rgba(240, 192, 64, 0.4);
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .login-btn svg {
      width: 22px;
      height: 22px;
    }

    /* ── ゲスト名登録モーダル ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal {
      background: #111827;
      border: 2px solid var(--color-accent);
      border-radius: 8px;
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .modal h2 {
      color: var(--color-accent);
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .modal p {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
    }

    .name-input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .name-input-group input {
      text-align: center;
      font-size: 1.1rem;
    }

    .name-status {
      font-size: 0.8rem;
      min-height: 1.2em;
    }

    .name-status.available {
      color: var(--color-correct);
    }

    .name-status.taken {
      color: var(--color-wrong);
    }

    .blinking-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--color-accent);
      margin-left: 4px;
      animation: cursor-blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── 装飾ドット ── */
    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 40px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--color-accent);
      opacity: 0.3;
    }

    .dot:nth-child(2) { opacity: 0.5; }
    .dot:nth-child(3) { opacity: 0.8; }
    .dot:nth-child(4) { opacity: 0.5; }

    @media (max-width: 600px) {
      .title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <!-- ログイン画面 -->
  <div class="login-wrapper" id="loginScreen">
    <h1 class="title">ニュース<br>読んでる？</h1>
    <p class="subtitle">弁論部向け 毎週時事ニュースクイズ</p>

    <button class="login-btn" id="googleLoginBtn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Googleでログイン
    </button>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- ゲスト名登録モーダル（初回ログイン時のみ表示） -->
  <div class="modal-overlay hidden" id="nameModal">
    <div class="modal">
      <h2>ゲスト名を決めよう</h2>
      <p>ランキングに表示される名前です（後から変更できません）</p>
      <div class="name-input-group">
        <input type="text" id="guestNameInput" placeholder="ゲスト名を入力" maxlength="20" autocomplete="off">
        <div class="name-status" id="nameStatus"></div>
        <button class="btn btn--accent" id="registerBtn" disabled onclick="handleRegister()">
          この名前で始める
        </button>
      </div>
    </div>
  </div>

  <script src="js/config.js" onerror="console.warn('config.js not found')"></script>
  <script>
    if (typeof _supabase === 'undefined') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#f0c040"><h2>設定ファイルが見つかりません</h2><p style="color:#aaa;margin-top:12px">js/config.js を作成してください。<br>テンプレート: js/config.example.js</p></div>';
      throw new Error('config.js is missing');
    }
  </script>
  <script src="js/auth.js"></script>
  <script>
    let nameCheckTimer = null;

    document.getElementById('guestNameInput').addEventListener('input', function () {
      const name = this.value.trim();
      const statusEl = document.getElementById('nameStatus');
      const registerBtn = document.getElementById('registerBtn');

      registerBtn.disabled = true;

      if (name.length === 0) {
        statusEl.textContent = '';
        statusEl.className = 'name-status';
        return;
      }

      if (name.length < 2) {
        statusEl.textContent = '2文字以上で入力してください';
        statusEl.className = 'name-status taken';
        return;
      }

      statusEl.textContent = '確認中...';
      statusEl.className = 'name-status';

      clearTimeout(nameCheckTimer);
      nameCheckTimer = setTimeout(async () => {
        const available = await checkGuestNameAvailable(name);
        if (available) {
          statusEl.textContent = '✓ 使用できます';
          statusEl.className = 'name-status available';
          registerBtn.disabled = false;
        } else {
          statusEl.textContent = '✗ この名前は使用されています';
          statusEl.className = 'name-status taken';
          registerBtn.disabled = true;
        }
      }, 400);
    });

    async function handleRegister() {
      const name = document.getElementById('guestNameInput').value.trim();
      if (!name || name.length < 2) return;

      const registerBtn = document.getElementById('registerBtn');
      registerBtn.disabled = true;
      registerBtn.textContent = '登録中...';

      const { error } = await registerGuestName(name);
      if (error) {
        alert(error);
        registerBtn.disabled = false;
        registerBtn.textContent = 'この名前で始める';
        return;
      }

      window.location.href = 'home.html';
    }

    (async function init() {
      const { data: { user } } = await _supabase.auth.getUser();
      if (!user) return;

      const { data: profile } = await _supabase
        .from('users')
        .select('guest_name')
        .eq('id', user.id)
        .maybeSingle();

      if (profile && profile.guest_name) {
        window.location.href = 'home.html';
      } else {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('nameModal').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
