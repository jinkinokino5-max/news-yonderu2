<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランク手動変更 | ニュース読んでる？</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-wrapper {
      position: relative; z-index: 1;
      max-width: 700px; margin: 0 auto; padding: 24px 16px 60px;
    }
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .admin-title { font-family: var(--font-pixel); font-size: 1rem; color: var(--color-accent); }
    .admin-back { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

    /* ── 検索 ── */
    .search-area {
      display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .search-area input {
      flex: 1; min-width: 200px;
    }
    .search-btn {
      padding: 12px 24px; font-size: 0.9rem; font-weight: 700;
      color: var(--color-base); background: var(--color-accent);
      border: none; border-radius: 4px; cursor: pointer;
      transition: background 0.2s;
    }
    .search-btn:hover { background: #e0b030; }

    /* ── ユーザーカード ── */
    .user-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .user-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }

    .user-card-name {
      font-size: 1rem; font-weight: 700; color: var(--color-text);
    }

    .user-card-meta {
      font-size: 0.78rem; color: rgba(255,255,255,0.45);
    }

    .rank-info-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .rank-info-label {
      font-size: 0.8rem; color: rgba(255,255,255,0.5); width: 100px; flex-shrink: 0;
    }

    .rank-info-value {
      font-size: 0.9rem; color: var(--color-text); font-weight: 700;
    }

    .rank-info-value.accent { color: var(--color-accent); }

    /* ── ランク選択 ── */
    .rank-select-area {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }

    .rank-select-area label {
      display: block; font-size: 0.78rem; color: rgba(255,255,255,0.5);
      margin-bottom: 8px; font-weight: 700;
    }

    .rank-select-row {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }

    .rank-select-row select {
      flex: 1; min-width: 200px;
    }

    .rank-save-btn {
      padding: 10px 24px; font-size: 0.85rem; font-weight: 700;
      color: var(--color-base); background: var(--color-accent);
      border: none; border-radius: 4px; cursor: pointer;
      transition: background 0.2s;
    }
    .rank-save-btn:hover { background: #e0b030; }

    .rank-save-status {
      font-size: 0.78rem; margin-left: 8px;
    }
    .rank-save-status.ok   { color: var(--color-correct); }
    .rank-save-status.fail { color: var(--color-wrong); }

    .no-result {
      text-align: center; font-size: 0.85rem;
      color: rgba(255,255,255,0.4); padding: 32px 16px;
    }

    /* ── ランク一覧テーブル ── */
    .rank-ref-section {
      margin-top: 36px;
    }
    .rank-ref-section h3 {
      font-family: var(--font-pixel); font-size: 0.75rem;
      color: var(--color-accent); margin-bottom: 12px;
    }
    .rank-ref-table th { font-size: 0.65rem; }
    .rank-ref-table td { font-size: 0.8rem; }
    .rank-ref-table .chapter-cell { color: rgba(255,255,255,0.4); font-size: 0.72rem; }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <div class="admin-header">
      <h1 class="admin-title">ランク手動変更</h1>
      <a href="index.html" class="admin-back">← ダッシュボード</a>
    </div>

    <!-- 検索 -->
    <div class="search-area">
      <input type="text" id="searchInput" placeholder="ゲスト名で検索..." autocomplete="off">
      <button class="search-btn" onclick="searchUser()">検索</button>
    </div>

    <!-- 検索結果 -->
    <div id="results"></div>

    <!-- ランク一覧リファレンス -->
    <div class="rank-ref-section">
      <h3>ランク一覧</h3>
      <table class="rank-ref-table">
        <thead>
          <tr><th>ID</th><th>役職名</th><th>章</th><th>必要スコア</th></tr>
        </thead>
        <tbody id="rankRefBody"></tbody>
      </table>
    </div>
  </div>

  <script src="../js/config.js" onerror="console.warn('config.js not found')"></script>
  <script>
    if (typeof _supabase === 'undefined') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#f0c040"><h2>設定ファイルが見つかりません</h2><p style="color:#aaa;margin-top:12px">js/config.js を作成してください。<br>テンプレート: js/config.example.js</p></div>';
      throw new Error('config.js is missing');
    }
  </script>
  <script src="../js/auth.js"></script>
  <script src="../js/rank-system.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    const CHAPTER_NAMES = ['', '第1章', '第2章', '第3章', '第4章', '第5章'];

    (async function init() {
      const user = await requireAdmin();
      if (!user) return;

      // ランク一覧テーブル
      const refBody = document.getElementById('rankRefBody');
      RANKS.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.id}</td>
          <td>${r.name}</td>
          <td class="chapter-cell">${CHAPTER_NAMES[r.chapter]}</td>
          <td>${r.min}〜</td>
        `;
        refBody.appendChild(tr);
      });

      // Enterキーで検索
      document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchUser();
      });
    })();

    async function searchUser() {
      const query = document.getElementById('searchInput').value.trim();
      const resultsEl = document.getElementById('results');

      if (!query) {
        resultsEl.innerHTML = '<div class="no-result">ゲスト名を入力してください。</div>';
        return;
      }

      resultsEl.innerHTML = '<div class="loading" style="min-height:60px">検索中...</div>';

      const { data: users } = await _supabase
        .from('users')
        .select('*')
        .ilike('guest_name', `%${query}%`)
        .order('guest_name');

      if (!users || users.length === 0) {
        resultsEl.innerHTML = '<div class="no-result">該当するユーザーが見つかりません。</div>';
        return;
      }

      resultsEl.innerHTML = users.map(u => {
        const rank = getRankById(u.rank_id || 1);
        const options = RANKS.map(r =>
          `<option value="${r.id}" ${r.id === (u.rank_id||1) ? 'selected' : ''}>${r.id}. ${r.name}（第${r.chapter}章）</option>`
        ).join('');

        return `
          <div class="user-card" id="ucard-${u.id}">
            <div class="user-card-header">
              <span class="user-card-name">${u.guest_name}</span>
              <span class="user-card-meta">${u.role} | 登録: ${new Date(u.created_at).toLocaleDateString('ja-JP')}</span>
            </div>
            <div class="rank-info-row">
              <span class="rank-info-label">現在のランク</span>
              <span class="rank-info-value accent">${rank.name}（ID: ${rank.id}）</span>
            </div>
            <div class="rank-info-row">
              <span class="rank-info-label">ランクスコア</span>
              <span class="rank-info-value">${Math.floor(u.rank_score || 0)}</span>
            </div>
            <div class="rank-info-row">
              <span class="rank-info-label">参加回数</span>
              <span class="rank-info-value">${u.total_participations || 0}</span>
            </div>
            <div class="rank-select-area">
              <label>ランクを変更</label>
              <div class="rank-select-row">
                <select id="sel-${u.id}">${options}</select>
                <button class="rank-save-btn" onclick="saveRank('${u.id}')">変更</button>
                <span class="rank-save-status" id="rstatus-${u.id}"></span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function saveRank(userId) {
      const sel = document.getElementById(`sel-${userId}`);
      const statusEl = document.getElementById(`rstatus-${userId}`);
      const newRankId = parseInt(sel.value, 10);

      if (!confirm(`ランクを「${getRankById(newRankId).name}」に変更しますか？`)) return;

      statusEl.textContent = '変更中...';
      statusEl.className = 'rank-save-status';

      const ok = await changeUserRank(userId, newRankId);
      if (ok) {
        statusEl.textContent = '変更しました';
        statusEl.className = 'rank-save-status ok';
      } else {
        statusEl.textContent = '変更に失敗しました';
        statusEl.className = 'rank-save-status fail';
      }
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    }
  </script>
</body>
</html>
