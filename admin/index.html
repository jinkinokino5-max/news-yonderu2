<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード | ニュース読んでる？</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-wrapper {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .admin-title {
      font-family: var(--font-pixel);
      font-size: 1rem;
      color: var(--color-accent);
    }

    .admin-back {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    /* ── 統計カード ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 18px 14px;
      text-align: center;
    }

    .stat-card .stat-val {
      font-family: var(--font-pixel);
      font-size: 1.5rem;
      color: var(--color-accent);
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }

    /* ── 最新クイズ情報 ── */
    .latest-quiz-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .latest-quiz-card h3 {
      font-size: 0.85rem;
      color: var(--color-accent);
      margin-bottom: 12px;
    }

    .latest-info {
      font-size: 0.88rem;
      line-height: 2;
      color: rgba(255,255,255,0.7);
    }

    .latest-info .tag-published {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 3px;
    }

    .tag-published.yes {
      background: rgba(0,200,80,0.15);
      color: #66ff99;
      border: 1px solid rgba(0,200,80,0.3);
    }

    .tag-published.no {
      background: rgba(255,150,0,0.15);
      color: #ffaa44;
      border: 1px solid rgba(255,150,0,0.3);
    }

    /* ── ナビグリッド ── */
    .admin-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .admin-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 22px 16px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      color: var(--color-text);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      transition: background 0.2s, border-color 0.2s;
    }

    .admin-nav-btn:hover {
      background: rgba(240,192,64,0.08);
      border-color: rgba(240,192,64,0.5);
    }

    .admin-nav-btn .nav-icon {
      font-size: 1.8rem;
    }

    /* ── 手動生成ボタン ── */
    .generate-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .generate-btn {
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-base);
      background: var(--color-accent);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .generate-btn:hover {
      background: #e0b030;
    }

    .generate-btn:active {
      transform: scale(0.97);
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .generate-note {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr; }
      .admin-nav { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-wrapper">
    <div class="admin-header">
      <h1 class="admin-title">管理者ダッシュボード</h1>
      <a href="../home.html" class="admin-back">← ホームに戻る</a>
    </div>

    <!-- 統計 -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val" id="userCount">-</div>
        <div class="stat-label">登録ユーザー数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="quizCount">-</div>
        <div class="stat-label">クイズセット数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="latestWeek">-</div>
        <div class="stat-label">最新クイズ週</div>
      </div>
    </div>

    <!-- 最新クイズ情報 -->
    <div class="latest-quiz-card" id="latestCard">
      <h3>最新クイズ</h3>
      <div class="latest-info" id="latestInfo">読み込み中...</div>
    </div>

    <!-- 手動生成ボタン -->
    <div class="generate-section">
      <button class="generate-btn" id="generateBtn" onclick="triggerGenerate()">クイズを今すぐ生成</button>
      <div class="generate-note">GitHub Actions の workflow_dispatch を手動実行します。<br>生成には数分かかります。</div>
    </div>

    <!-- 管理メニュー -->
    <div class="admin-nav">
      <a href="quiz-edit.html" class="admin-nav-btn">
        <span class="nav-icon">📝</span>
        クイズ編集・公開
      </a>
      <a href="users.html" class="admin-nav-btn">
        <span class="nav-icon">👤</span>
        ユーザー管理
      </a>
      <a href="rank-edit.html" class="admin-nav-btn">
        <span class="nav-icon">⭐</span>
        ランク手動変更
      </a>
      <a href="../ranking.html" class="admin-nav-btn">
        <span class="nav-icon">🏆</span>
        ランキング確認
      </a>
    </div>
  </div>

  <script src="../js/config.js" onerror="console.warn('config.js not found')"></script>
  <script>
    if (typeof _supabase === 'undefined') {
      document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#f0c040"><h2>設定ファイルが見つかりません</h2><p style="color:#aaa;margin-top:12px">js/config.js を作成してください。<br>テンプレート: js/config.example.js</p></div>';
      throw new Error('config.js is missing');
    }
  </script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    (async function init() {
      const user = await requireAdmin();
      if (!user) return;

      const stats = await loadDashboardStats();

      document.getElementById('userCount').textContent = stats.userCount;
      document.getElementById('quizCount').textContent = stats.quizCount;

      const latest = stats.latestQuiz;
      if (latest) {
        document.getElementById('latestWeek').textContent = latest.week_id || '-';
        const pubTag = latest.is_published
          ? '<span class="tag-published yes">公開中</span>'
          : '<span class="tag-published no">未公開</span>';
        document.getElementById('latestInfo').innerHTML = `
          週：${latest.week_id || '-'}<br>
          状態：${pubTag}<br>
          作成日時：${new Date(latest.created_at).toLocaleString('ja-JP')}
        `;
      } else {
        document.getElementById('latestInfo').textContent = 'クイズセットはまだありません。';
      }
    })();

    async function triggerGenerate() {
      if (typeof GH_PAT === 'undefined' || !GH_PAT || GH_PAT === 'YOUR_GITHUB_PAT') {
        alert('GitHub PAT が設定されていません。\njs/config.js の GH_PAT を設定してください。');
        return;
      }

      const btn = document.getElementById('generateBtn');
      if (!confirm('GitHub Actions でクイズ生成を実行しますか？\n（リポジトリにワークフロー権限が必要です）')) return;

      btn.disabled = true;
      btn.textContent = '実行リクエスト中...';

      try {
        const res = await fetch(
          'https://api.github.com/repos/jinkinokino5-max/news-yonderu2/actions/workflows/weekly_quiz.yml/dispatches',
          {
            method: 'POST',
            headers: {
              'Accept': 'application/vnd.github+json',
              'Authorization': `Bearer ${GH_PAT}`,
            },
            body: JSON.stringify({ ref: 'main' }),
          }
        );

        if (res.status === 204) {
          alert('ワークフローを起動しました。生成には数分かかります。');
        } else {
          alert('実行に失敗しました (status: ' + res.status + ')。\nGitHub PAT の権限を確認してください。');
        }
      } catch (e) {
        alert('エラー: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'クイズを今すぐ生成';
    }
  </script>
</body>
</html>
