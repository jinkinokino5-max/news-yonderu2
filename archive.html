<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>過去問アーカイブ | ニュース読んでる？</title>
  <link rel="stylesheet" href="css/base.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .archive-wrapper {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .page-title {
      text-align: center;
      font-family: var(--font-pixel);
      font-size: 1rem;
      color: var(--color-accent);
      margin-bottom: 28px;
    }

    /* ── 週カード一覧 ── */
    .week-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .week-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .week-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .week-card-header:hover {
      background: rgba(240,192,64,0.05);
    }

    .week-card-title {
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      color: var(--color-accent);
    }

    .week-card-date {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    .week-card-toggle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      transition: transform 0.2s;
    }

    .week-card.open .week-card-toggle {
      transform: rotate(180deg);
    }

    .week-card-body {
      display: none;
      padding: 0 18px 18px;
    }

    .week-card.open .week-card-body {
      display: block;
    }

    /* ── 問題カード ── */
    .archive-question {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .aq-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .aq-num {
      font-family: var(--font-pixel);
      font-size: 0.7rem;
      color: var(--color-accent);
    }

    .aq-text {
      font-size: 0.9rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.85);
      margin-bottom: 10px;
    }

    .aq-choices {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }

    .aq-choice {
      font-size: 0.82rem;
      line-height: 1.5;
      padding: 4px 8px;
      border-radius: 3px;
      color: rgba(255,255,255,0.55);
    }

    .aq-choice.is-correct {
      background: rgba(0,255,0,0.07);
      border: 1px solid rgba(0,255,0,0.2);
      color: rgba(255,255,255,0.8);
    }

    .aq-choice .aq-label {
      font-family: var(--font-pixel);
      font-size: 0.6rem;
      margin-right: 4px;
      color: rgba(255,255,255,0.4);
    }

    .aq-choice.is-correct .aq-label {
      color: var(--color-correct);
    }

    .aq-answer {
      font-size: 0.78rem;
      color: var(--color-correct);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .aq-explanation {
      font-size: 0.82rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.02);
      padding: 10px 12px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .aq-debate {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      padding: 6px 10px;
      background: rgba(240,192,64,0.04);
      border-left: 2px solid var(--color-accent);
      border-radius: 0 4px 4px 0;
    }

    .aq-debate strong {
      color: var(--color-accent);
    }

    .empty-msg {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      padding: 40px 16px;
    }

    @media (max-width: 480px) {
      .week-card-header { padding: 12px 14px; }
      .week-card-body { padding: 0 14px 14px; }
      .archive-question { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="archive-wrapper">
    <h1 class="page-title">過去問アーカイブ</h1>

    <div class="week-list" id="weekList">
      <div class="loading">読み込み中...</div>
    </div>

    <div class="empty-msg hidden" id="emptyMsg">過去のクイズはまだありません。</div>

    <div style="text-align:center; margin-top:24px;">
      <a href="home.html" class="btn btn--accent">ホームに戻る</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const categoryLabel = { politics: '政治', economy: '経済', international: '国際' };
    const diffLabel = { easy: '易', medium: '中', hard: '難' };

    (async function init() {
      const user = await requireAuth();
      if (!user) return;

      // 全クイズセットを週降順で取得
      const { data: quizSets } = await _supabase
        .from('quiz_sets')
        .select('id, week_id, week_start, week_end, is_published')
        .eq('is_published', true)
        .order('week_start', { ascending: false });

      const weekList = document.getElementById('weekList');
      weekList.innerHTML = '';

      if (!quizSets || quizSets.length === 0) {
        document.getElementById('emptyMsg').classList.remove('hidden');
        return;
      }

      for (const qs of quizSets) {
        const card = document.createElement('div');
        card.className = 'week-card';

        const header = document.createElement('div');
        header.className = 'week-card-header';
        header.innerHTML = `
          <div>
            <div class="week-card-title">${qs.week_id}</div>
            <div class="week-card-date">${qs.week_start} ～ ${qs.week_end}</div>
          </div>
          <span class="week-card-toggle">▼</span>
        `;

        const body = document.createElement('div');
        body.className = 'week-card-body';
        body.dataset.quizId = qs.id;
        body.dataset.loaded = 'false';

        header.addEventListener('click', () => toggleWeek(card, body));

        card.appendChild(header);
        card.appendChild(body);
        weekList.appendChild(card);
      }
    })();

    async function toggleWeek(card, body) {
      const isOpen = card.classList.contains('open');

      if (isOpen) {
        card.classList.remove('open');
        return;
      }

      card.classList.add('open');

      // 既に読み込み済みならスキップ
      if (body.dataset.loaded === 'true') return;

      body.innerHTML = '<div class="loading" style="min-height:60px">読み込み中...</div>';

      const { data: questions } = await _supabase
        .from('questions')
        .select('*')
        .eq('quiz_id', body.dataset.quizId)
        .order('order_num', { ascending: true });

      if (!questions || questions.length === 0) {
        body.innerHTML = '<div style="padding:12px;font-size:0.85rem;color:rgba(255,255,255,0.4)">問題が見つかりません。</div>';
        body.dataset.loaded = 'true';
        return;
      }

      const labels = ['A', 'B', 'C', 'D'];
      body.innerHTML = questions.map(q => {
        const choices = [q.choice_a, q.choice_b, q.choice_c, q.choice_d];
        return `
          <div class="archive-question">
            <div class="aq-header">
              <span class="aq-num">Q${q.order_num}</span>
              <span class="badge badge--${q.category}">${categoryLabel[q.category] || q.category}</span>
              <span class="badge badge--${q.difficulty}">${diffLabel[q.difficulty] || q.difficulty}</span>
            </div>
            <div class="aq-text">${q.question_text}</div>
            <div class="aq-choices">
              ${labels.map((l, i) => {
                const isCorrect = l === q.correct_answer;
                return `<div class="aq-choice${isCorrect ? ' is-correct' : ''}"><span class="aq-label">${l}.</span> ${choices[i]}</div>`;
              }).join('')}
            </div>
            <div class="aq-answer">正解：${q.correct_answer}</div>
            ${q.explanation ? `<div class="aq-explanation">${q.explanation}</div>` : ''}
            ${q.debate_topic ? `<div class="aq-debate"><strong>関連論題：</strong>${q.debate_topic}</div>` : ''}
          </div>
        `;
      }).join('');

      body.dataset.loaded = 'true';
    }
  </script>
</body>
</html>
